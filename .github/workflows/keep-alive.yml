name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC to prevent Supabase free-tier pause
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/requests?select=id&limit=1")
          echo "Status: $response"
          if [ "$response" != "200" ] && [ "$response" != "406" ]; then
            echo "Warning: unexpected status $response"
          fi
